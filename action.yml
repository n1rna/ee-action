name: 'ee hydrate'
description: 'Generate env files from .ee config using the ee CLI'

inputs:
  environment:
    description: 'Target environment name passed to ee hydrate'
    required: true
  config_path:
    description: 'Path to the .ee config file'
    required: true
  env_file:
    description: 'Output file path for the generated env file'
    required: true
  gh_secret:
    description: 'Multi-line KEY=VALUE string from a GitHub secret'
    required: true
  format:
    description: 'Output format (dotenv, json, yaml)'
    required: false
    default: 'dotenv'
  ee_version:
    description: 'ee CLI version to download from releases'
    required: false
    default: 'latest'

runs:
  using: 'composite'
  steps:
    - name: Install ee CLI
      shell: bash
      run: |
        set -euo pipefail

        VERSION="${{ inputs.ee_version }}"

        OS="$(uname -s | tr '[:upper:]' '[:lower:]')"
        ARCH="$(uname -m)"
        case "$ARCH" in
          x86_64)  ARCH="amd64" ;;
          aarch64) ARCH="arm64" ;;
        esac

        ARCHIVE="ee-${OS}-${ARCH}.tar.gz"

        if [ "$VERSION" = "latest" ]; then
          DOWNLOAD_URL="https://github.com/n1rna/ee-cli/releases/latest/download/${ARCHIVE}"
        else
          DOWNLOAD_URL="https://github.com/n1rna/ee-cli/releases/download/${VERSION}/${ARCHIVE}"
        fi

        INSTALL_DIR="$HOME/.ee/bin"
        mkdir -p "$INSTALL_DIR"

        echo "Downloading ee CLI from $DOWNLOAD_URL"
        curl -fsSL -o "/tmp/${ARCHIVE}" "$DOWNLOAD_URL"
        tar xzf "/tmp/${ARCHIVE}" -C "$INSTALL_DIR"
        mv "$INSTALL_DIR/ee-${OS}-${ARCH}" "$INSTALL_DIR/ee"
        chmod +x "$INSTALL_DIR/ee"
        rm -f "/tmp/${ARCHIVE}"

        echo "$INSTALL_DIR" >> "$GITHUB_PATH"

    - name: Hydrate environment
      shell: bash
      env:
        EE_SECRET_ENV: ${{ inputs.gh_secret }}
      run: |
        set -euo pipefail

        # Write secret values to a temp env file
        TEMP_ENV="$(mktemp)"
        printf '%s\n' "$EE_SECRET_ENV" > "$TEMP_ENV"

        # Apply secret env vars and run hydrate in that context
        ee apply "$TEMP_ENV" -- \
          ee hydrate ${{ inputs.environment }} \
            --config ${{ inputs.config_path }} \
            --output ${{ inputs.env_file }} \
            --format ${{ inputs.format }}

        rm -f "$TEMP_ENV"
