name: 'ee hydrate'
description: 'Generate env files from .ee config using the ee CLI'

inputs:
  environment:
    description: 'Target environment name passed to ee hydrate'
    required: true
  config_path:
    description: 'Path to the .ee config file'
    required: true
  env_file:
    description: 'Output file path for the generated env file'
    required: true
  gh_secret:
    description: 'Multi-line KEY=VALUE string from a GitHub secret'
    required: true
  format:
    description: 'Output format (dotenv, json, yaml)'
    required: false
    default: 'dotenv'
  ee_version:
    description: 'ee CLI version to download from releases'
    required: false
    default: 'latest'

runs:
  using: 'composite'
  steps:
    - name: Install ee CLI
      shell: bash
      run: |
        set -euo pipefail

        VERSION="${{ inputs.ee_version }}"

        OS="$(uname -s | tr '[:upper:]' '[:lower:]')"
        ARCH="$(uname -m)"
        case "$ARCH" in
          x86_64)  ARCH="amd64" ;;
          aarch64) ARCH="arm64" ;;
        esac

        if [ "$VERSION" = "latest" ]; then
          DOWNLOAD_URL="https://github.com/n1rna/ee-cli/releases/latest/download/ee-${OS}-${ARCH}"
        else
          DOWNLOAD_URL="https://github.com/n1rna/ee-cli/releases/download/${VERSION}/ee-${OS}-${ARCH}"
        fi

        INSTALL_DIR="$HOME/.ee/bin"
        mkdir -p "$INSTALL_DIR"

        echo "Downloading ee CLI from $DOWNLOAD_URL"
        curl -fsSL -o "$INSTALL_DIR/ee" "$DOWNLOAD_URL"
        chmod +x "$INSTALL_DIR/ee"

        echo "$INSTALL_DIR" >> "$GITHUB_PATH"

    - name: Hydrate environment
      shell: bash
      run: |
        set -euo pipefail

        # Write secret values to a temp env file
        TEMP_ENV="$(mktemp)"
        cat << EOF > "$TEMP_ENV"
        ${{ inputs.gh_secret }}
        EOF

        # Apply secret env vars and run hydrate in that context
        ee apply "$TEMP_ENV" -- \
          ee hydrate ${{ inputs.environment }} \
            --config ${{ inputs.config_path }} \
            --output ${{ inputs.env_file }} \
            --format ${{ inputs.format }}

        rm -f "$TEMP_ENV"
